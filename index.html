<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Nasa Apod</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <nav class="navbar navbar-dark bg-black" style="margin-bottom: 20px;">
            <div class="container-fluid">

                <!-- Contenedor izquierda -->
                <a class="navbar-brand d-flex align-items-center" href="#">

                    <!-- Imagen -->
                    <img src="https://i.postimg.cc/wMKySyDD/unnamed-removebg-preview-removebg-preview.png"
                        alt="logo NASA" class="me-2">

                    <!-- Título -->
                    <span class="text-white fs-5">
                        Astronomy Picture of the Day
                    </span>

                </a>

            </div>
        </nav>
    </header>

    <!-- Fondo estrellas -->
    <div class="stars"></div>

    <main class="cuadro">

        <div class="buscarCss">
            <div class="buscador">

                <!-- Texto guía -->
                <h1>Explora imágenes del universo</h1>

                <!-- Selector fecha -->
                <input type="date" id="inputDate">

                <!-- Botón buscar -->
                <button id="Btnbuscar" type="button">Buscar</button>

                <!-- Contenedor APOD -->
                <div id="apodContainer">
                    <h2 id="apodTitulo"></h2>
                    <p id="apodDate"></p>
                    <div id="apodMedia"></div>
                    <p id="apodDescripcion"></p>
                </div>

                <!-- Botón favoritos -->
                <button id="BtnFavoritos" type="button" style="display: none;">⭐ Guardar en favoritos</button>

            </div>
        </div>

        <!-- Lista favoritos -->
        <section class="favorito">
            <h2>⭐ Favoritos</h2>
            <ul id="listaFavoritos"></ul>

        </section>

    </main>

    <footer>
        <small>© 2026 NASA Angie Beltran, Lucelly Valencia, Quiryat Moncada</small>
    </footer>

    <script src="app.js"></script>

</body>

</html>
